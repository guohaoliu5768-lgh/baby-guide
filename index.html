<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>育儿伴侣 · 从怀孕到6岁</title>
<style>
:root{
  --primary:#f2777a; --primary-soft:#fdeeee; --primary-deep:#d95a5e;
  --dad:#2f6fed; --dad-soft:#e8f0fe; --dad-deep:#1d4fb8;
  --bg:#faf6f1; --card:#ffffff; --text:#3a3230; --muted:#8d817b;
  --green:#3aa876; --green-soft:#e6f5ee; --amber:#e8a33d; --amber-soft:#fdf3e2;
  --line:#f0e8e2; --radius:16px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#e9e2da;color:var(--text);display:flex;justify-content:center;min-height:100vh}
.phone{width:100%;max-width:430px;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;position:relative;box-shadow:0 0 40px rgba(0,0,0,.12)}
main{flex:1;overflow-y:auto;padding:16px 16px 90px}
h1{font-size:20px}
.view{display:none}.view.active{display:block}
/* header */
.appbar{display:flex;align-items:center;justify-content:space-between;padding:4px 2px 14px}
.appbar .logo{font-size:20px;font-weight:700;color:var(--primary-deep)}
.appbar .gear{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted)}
/* cards */
.card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:0 2px 10px rgba(90,60,40,.05);border:1px solid var(--line)}
.card h3{font-size:15px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.card p,.card li{font-size:14px;line-height:1.7;color:#5a504b}
.card ul{padding-left:18px}
.stage-card{background:linear-gradient(135deg,#f2777a,#e8938c);color:#fff;border:none}
.stage-card .big{font-size:26px;font-weight:700;margin:4px 0}
.stage-card p{color:rgba(255,255,255,.92)}
.stage-card .sub{font-size:13px;opacity:.9}
/* dad card —— 重点突出 */
.dad-card{background:linear-gradient(135deg,#2f6fed,#4d86f5);color:#fff;border:none;position:relative;overflow:hidden}
.dad-card::after{content:"👨‍🍼";position:absolute;right:-6px;bottom:-14px;font-size:64px;opacity:.18}
.dad-card h3{color:#fff;font-size:16px}
.dad-card .badge{background:rgba(255,255,255,.25);border-radius:20px;padding:2px 10px;font-size:11px}
.dad-task{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.18);font-size:14px;line-height:1.6;color:#fff;cursor:pointer}
.dad-task:last-child{border-bottom:none}
.dad-task input{margin-top:4px;accent-color:#fff;width:16px;height:16px;flex:none}
.dad-task.done span{opacity:.55;text-decoration:line-through}
.dad-inline{background:var(--dad-soft);border-left:4px solid var(--dad);border-radius:10px;padding:10px 12px;margin-top:10px}
.dad-inline b{color:var(--dad-deep);font-size:13px}
.dad-inline ul{padding-left:16px;margin-top:4px}
.dad-inline li{font-size:13.5px;color:#33528f}
/* tags & misc */
.tag{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;margin-right:6px}
.tag.pink{background:var(--primary-soft);color:var(--primary-deep)}
.tag.blue{background:var(--dad-soft);color:var(--dad-deep)}
.tag.green{background:var(--green-soft);color:var(--green)}
.tag.amber{background:var(--amber-soft);color:var(--amber)}
.tip{background:var(--amber-soft);border-radius:10px;padding:10px 12px;font-size:13px;color:#8a6420;margin-top:10px;line-height:1.6}
.next-card{display:flex;gap:12px;align-items:center}
.next-card .icon{font-size:26px}
.next-card .t{font-size:14px;font-weight:600}
.next-card .d{font-size:12.5px;color:var(--muted);margin-top:2px}
/* segments */
.seg{display:flex;background:#efe7e0;border-radius:12px;padding:3px;margin-bottom:14px}
.seg button{flex:1;border:none;background:none;padding:8px 2px;font-size:13px;border-radius:10px;color:var(--muted);cursor:pointer;white-space:nowrap}
.seg button.on{background:#fff;color:var(--text);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.08)}
/* chips */
.chips{display:flex;gap:8px;overflow-x:auto;padding:2px 0 12px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:none;border:1px solid var(--line);background:#fff;border-radius:20px;padding:6px 14px;font-size:13px;color:var(--muted);cursor:pointer}
.chip.on{background:var(--primary);border-color:var(--primary);color:#fff;font-weight:600}
/* checklist */
.ck{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px;cursor:pointer}
.ck:last-child{border-bottom:none}
.ck input{margin-top:4px;accent-color:var(--primary);width:16px;height:16px;flex:none}
.ck.done span{color:var(--muted);text-decoration:line-through}
.ck .who{margin-left:auto;flex:none}
/* vaccine */
.vax-group{margin-bottom:6px}
.vax-age{font-size:13px;font-weight:700;color:var(--primary-deep);margin:14px 0 6px}
/* forms */
label.f{display:block;font-size:13px;color:var(--muted);margin:12px 0 5px}
input.f,select.f{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;font-size:15px;background:#fff;color:var(--text)}
.btn{width:100%;padding:13px;border:none;border-radius:12px;background:var(--primary);color:#fff;font-size:16px;font-weight:600;cursor:pointer;margin-top:18px}
.btn.ghost{background:none;color:var(--muted);font-size:13px;padding:8px;margin-top:6px}
.choice{display:flex;gap:10px;margin-top:14px}
.choice button{flex:1;padding:18px 8px;border:2px solid var(--line);border-radius:14px;background:#fff;font-size:15px;cursor:pointer;color:var(--text)}
.choice button.on{border-color:var(--primary);background:var(--primary-soft);font-weight:600}
/* records */
.rec-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line);font-size:14px}
.rec-row:last-child{border-bottom:none}
.rec-row .d{color:var(--muted);font-size:12.5px}
.ref{font-size:12.5px;color:var(--muted);margin-top:8px;line-height:1.6}
/* bottom nav */
nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:1px solid var(--line);display:flex;padding:6px 0 max(8px,env(safe-area-inset-bottom));z-index:50}
nav button{flex:1;border:none;background:none;font-size:11px;color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0}
nav button .i{font-size:21px}
nav button.on{color:var(--primary-deep);font-weight:600}
/* onboarding */
#onboard{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;justify-content:center}
#onboard .inner{width:100%;max-width:430px;padding:60px 28px}
#onboard h1{color:var(--primary-deep);font-size:26px}
#onboard .sub{color:var(--muted);font-size:14px;margin-top:8px;line-height:1.7}
.hidden{display:none!important}
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.week-nav button{border:1px solid var(--line);background:#fff;border-radius:10px;padding:6px 14px;font-size:14px;cursor:pointer;color:var(--text)}
.week-nav .cur{font-size:16px;font-weight:700;color:var(--primary-deep)}
.meal{padding:9px 0;border-bottom:1px solid var(--line)}
.meal:last-child{border-bottom:none}
.meal b{font-size:13px;color:var(--primary-deep)}
.meal p{font-size:13.5px;line-height:1.7;color:#5a504b;margin-top:2px}
.disclaimer{font-size:11.5px;color:#b3a89f;text-align:center;padding:18px 20px 6px;line-height:1.6}
.empty{text-align:center;color:var(--muted);font-size:13px;padding:24px 0}
h2.sec{font-size:17px;margin:4px 0 12px}
</style>
</head>
<body>
<div class="phone">
<main>
  <div class="appbar">
    <div class="logo">🍼 育儿伴侣</div>
    <button class="gear" onclick="openOnboard()">⚙️</button>
  </div>

  <div id="view-home" class="view active"></div>

  <div id="view-preg" class="view">
    <h2 class="sec">🤰 孕期专区</h2>
    <div class="seg" id="preg-seg">
      <button class="on" data-p="week">逐周指导</button>
      <button data-p="checkup">产检</button>
      <button data-p="bag">待产包</button>
      <button data-p="diet">每日食谱</button>
    </div>
    <div id="preg-week"></div>
    <div id="preg-checkup" class="hidden"></div>
    <div id="preg-bag" class="hidden"></div>
    <div id="preg-diet" class="hidden"></div>
  </div>

  <div id="view-baby" class="view">
    <h2 class="sec">👶 育儿专区</h2>
    <div class="seg" id="baby-seg">
      <button class="on" data-b="y1">0-1岁</button>
      <button data-b="y3">1-3岁</button>
      <button data-b="y6">3-6岁</button>
      <button data-b="care">常见问题</button>
    </div>
    <div id="baby-content"></div>
  </div>

  <div id="view-vax" class="view">
    <h2 class="sec">💉 疫苗接种表</h2>
    <p style="font-size:12.5px;color:var(--muted);margin-bottom:12px">国家免疫规划（免费）疫苗，点击勾选已完成的接种。</p>
    <div id="vax-list"></div>
  </div>

  <div id="view-rec" class="view">
    <h2 class="sec">📏 成长记录</h2>
    <div class="card">
      <h3>添加记录</h3>
      <label class="f">日期</label><input class="f" type="date" id="rec-date">
      <label class="f">身高 (cm)</label><input class="f" type="number" step="0.1" id="rec-h" placeholder="如 75.5">
      <label class="f">体重 (kg)</label><input class="f" type="number" step="0.01" id="rec-w" placeholder="如 9.6">
      <button class="btn" onclick="addRec()">保存记录</button>
    </div>
    <div class="card"><h3>参考范围</h3><div id="rec-ref" class="ref"></div></div>
    <div class="card"><h3>历史记录</h3><div id="rec-list"></div></div>
  </div>

  <div class="disclaimer">内容依据孕产妇及儿童保健常规整理，仅供参考，不能替代医生诊断与建议。如有异常请及时就医。</div>
</main>

<nav id="nav">
  <button class="on" data-v="home"><span class="i">🏠</span>首页</button>
  <button data-v="preg"><span class="i">🤰</span>孕期</button>
  <button data-v="baby"><span class="i">👶</span>育儿</button>
  <button data-v="vax"><span class="i">💉</span>疫苗</button>
  <button data-v="rec"><span class="i">📏</span>记录</button>
</nav>
</div>

<div id="onboard" class="hidden">
  <div class="inner">
    <h1>🍼 育儿伴侣</h1>
    <p class="sub">从怀孕到宝宝6岁的全程指导，<b>爸爸的任务清单</b>重点标注。先告诉我你们现在的阶段：</p>
    <div class="choice">
      <button id="ob-preg" onclick="obPick('preg')">🤰<br>怀孕中</button>
      <button id="ob-born" onclick="obPick('born')">👶<br>宝宝已出生</button>
    </div>
    <div id="ob-form-preg" class="hidden">
      <label class="f">预产期</label>
      <input class="f" type="date" id="ob-due">
    </div>
    <div id="ob-form-born" class="hidden">
      <label class="f">宝宝生日</label>
      <input class="f" type="date" id="ob-birth">
      <label class="f">性别（用于生长参考范围）</label>
      <select class="f" id="ob-sex"><option value="boy">男宝</option><option value="girl">女宝</option></select>
    </div>
    <button class="btn" onclick="obSave()">开始使用</button>
  </div>
</div>

<script>
// ===== 孕期数据：40周逐周指导 =====
const PREG = [
{w:1,baby:"本周从末次月经第一天算起，宝宝还未真正形成，身体在为排卵做准备。",mom:"处于月经期，和平时无异。开始补充叶酸（0.4mg/天）是关键。",tip:"备孕期夫妻双方都应戒烟戒酒，规律作息。",dad:["和妻子一起戒烟戒酒，二手烟同样影响备孕","陪妻子一起补充叶酸的同时，自己也可补充锌和维生素","记录妻子的月经周期，帮助推算排卵期"]},
{w:2,baby:"卵巢中的卵泡正在成熟，本周末可能排卵，受孕窗口临近。",mom:"排卵期临近，白带增多透亮。保持好心情有助受孕。",tip:"排卵日前后隔天同房受孕率最高，不要过度紧张。",dad:["保持规律作息、适度运动，提高精子质量","主动分担家务，让妻子放松心情","避免蒸桑拿、泡温泉（高温影响精子）"]},
{w:3,baby:"精卵结合！受精卵开始分裂，沿输卵管向子宫移动。",mom:"身体尚无感觉，但新生命已经启程。避免服药、照X光。",tip:"从现在起妻子用药需谨慎，任何药物先咨询医生。",dad:["提醒妻子避免接触烟酒、辐射和有毒化学品","家里大扫除、接触清洁剂的活由你来干","开始学习孕期知识，做有准备的爸爸"]},
{w:4,baby:"胚胎着床于子宫内膜，仅0.2mm大小，胎盘和羊膜囊开始形成。",mom:"月经该来没来！可能有轻微着床出血或疲倦感。可用早孕试纸检测。",tip:"验出两条杠先别声张，1-2周后去医院抽血确认。",dad:["买早孕试纸，陪妻子一起见证结果","无论结果如何，给妻子稳定的情绪支持","开始记账，规划孕产育儿预算"]},
{w:5,baby:"胚胎如芝麻大（约2mm），神经管开始发育，心脏雏形出现。",mom:"早孕反应可能开始：恶心、乏力、乳房胀痛、尿频。",tip:"神经管发育关键期，叶酸千万别断。",dad:["把家里的咖啡、酒收起来，别在妻子面前吃她闻了想吐的食物","预约医院首诊，查HCG和孕酮","妻子情绪波动大，多包容、多倾听、少讲道理"]},
{w:6,baby:"胚胎约4-6mm，心脏开始跳动（B超可见胎心搏动）！",mom:"孕吐可能加重，闻到油烟就恶心。少食多餐，吃点苏打饼干。",tip:"孕6-8周B超确认宫内孕和胎心，排除宫外孕。",dad:["陪妻子做第一次B超，一起听胎心","接管厨房或安排外卖，让妻子远离油烟","在她床头备好饼干和温水，缓解晨起孕吐"]},
{w:7,baby:"胚胎约1cm，像颗蓝莓。大脑快速发育，四肢芽出现。",mom:"孕吐高峰期，嗜睡明显。体重可能不增反降，别慌。",tip:"吐得完全吃不下、尿少时要就医（警惕妊娠剧吐）。",dad:["观察记录妻子孕吐情况，严重时果断陪她就医","下班早点回家，家务全包不是口号","给妻子准备酸味小零食（话梅、柠檬水）"]},
{w:8,baby:"约1.6cm，手指脚趾开始分化，小尾巴逐渐消失。",mom:"子宫增大到拳头大，可能有轻微腹部抽痛，属正常牵拉感。",tip:"出现鲜红出血或剧烈腹痛需立即就医。",dad:["确认建档医院，了解建档要带的证件材料","帮妻子调整工作强度，需要时和她一起与领导沟通","睡前给妻子按摩肩颈（避开腰腹部穴位）"]},
{w:9,baby:"约2.3cm，进入胎儿期！所有重要器官都已成形，开始小幅活动。",mom:"腰围渐粗，乳房继续增大。情绪易低落，激素在作怪。",tip:"可以开始换穿宽松衣物和舒适内衣。",dad:["陪妻子买孕妇内衣和平底鞋","每天安排20-30分钟散步，陪她一起走","把'辛苦了''你真棒'挂在嘴边，肯定她的付出"]},
{w:10,baby:"约3cm，重4g。器官快速生长，胎盘即将接管营养供应。",mom:"孕吐开始缓一些。牙龈可能出血，注意口腔护理。",tip:"建档一般在孕6-13周完成，别拖过12周。",dad:["请假陪妻子去医院建档（流程长，跑腿排队你来）","整理双方身份证、医保卡、母子手册等材料","了解生育保险报销政策"]},
{w:11,baby:"约4-6cm，头占身体一半。开始吞咽羊水，踢腿伸展。",mom:"体力逐渐恢复，食欲回升。开始控制体重增速。",tip:"NT检查（颈项透明层）在11-13周+6天之间做，需提前预约。",dad:["预约并陪同NT检查","一起制定孕期体重管理计划，别再劝'多吃点，一人吃两人补'","给宝宝拍下第一张B超照片，开始做成长相册"]},
{w:12,baby:"约6cm，重14g。五官清晰，声带形成，反射发育。",mom:"流产风险大幅下降，可以对外官宣了！早孕反应明显减轻。",tip:"孕12周左右完成首次正式产检（建档大检查）。",dad:["和妻子商量官宣方式，一起告诉双方父母","首次产检项目多（抽血、尿检、心电图），全程陪同","开始每天和肚子里的宝宝说说话，胎教从爸爸的声音开始"]},
{w:13,baby:"约7.5cm，指纹已形成，肠道开始蠕动练习。",mom:"进入相对舒适的孕中期。精力回升，是运动和出行的好时段。",tip:"孕中期（13-27周）是旅行、拍孕妇照的最佳窗口。",dad:["规划一次轻松的短途旅行（选医疗方便的目的地）","一起报名孕妇学校/产前课程，爸爸必须到场","研究婴儿用品，做功课列清单，避免临产乱买"]},
{w:14,baby:"约8.5cm，会皱眉、眯眼，长出胎毛保护皮肤。",mom:"小腹微隆。可能出现鼻塞、牙龈肿，是激素性的。",tip:"15-20周可做唐氏筛查（或无创DNA），和医生确认方案。",dad:["和医生一起商定唐筛/无创DNA方案并预约","每周固定一天'孕妈放松日'，安排她喜欢的活动","学习拍孕肚照，每周同角度记录一张"]},

// ===== 工具 =====
function lsGet(k,def){try{const v=localStorage.getItem(k);return v?JSON.parse(v):def}catch(e){return def}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function daysBetween(a,b){return Math.round((b-a)/864e5)}
function today(){const d=new Date();d.setHours(0,0,0,0);return d}

let profile=lsGet('yb_profile',null);

function pregWeek(){ // 当前孕周（1-42）
  const due=new Date(profile.due); due.setHours(0,0,0,0);
  const w=40-Math.ceil(daysBetween(today(),due)/7);
  return Math.max(1,Math.min(42,w));
}
function ageMonths(){ // 宝宝月龄（小数）
  const b=new Date(profile.birth); b.setHours(0,0,0,0);
  return daysBetween(b,today())/30.4375;
}
function ageText(){
  const m=ageMonths();
  if(m<1) return Math.max(0,Math.floor(m*30.4375))+"天";
  if(m<24){const mm=Math.floor(m);return mm+"个月"+(Math.floor((m-mm)*4)>0?"":"")}
  const y=Math.floor(m/12),mm=Math.floor(m%12);
  return y+"岁"+(mm?mm+"个月":"");
}
function babyStage(m){return BABY.find(s=>m>=s.range[0]&&m<s.range[1])||null}

// ===== 爸爸任务卡（可勾选） =====
function dadCard(tasks,key,title){
  const done=lsGet('yb_dad_'+key,[]);
  let h='<div class="card dad-card"><h3>👨 爸爸行动清单 <span class="badge">本阶段 '+tasks.length+' 项</span></h3>';
  tasks.forEach((t,i)=>{
    const on=done.includes(i);
    h+='<label class="dad-task'+(on?' done':'')+'"><input type="checkbox" '+(on?'checked':'')+' onchange="dadToggle(\''+key+'\','+i+')"><span>'+esc(t)+'</span></label>';
  });
  return h+'</div>';
}
function dadToggle(key,i){
  let done=lsGet('yb_dad_'+key,[]);
  done=done.includes(i)?done.filter(x=>x!==i):done.concat(i);
  lsSet('yb_dad_'+key,done); renderHome(); renderPregWeek(); renderBaby();
}

// ===== 首页 =====
function renderHome(){
  const el=document.getElementById('view-home');
  if(!profile){el.innerHTML='<div class="empty">请先完成设置 ⚙️</div>';return}
  let h='';
  if(profile.mode==='preg'){
    const w=pregWeek(), d=PREG[Math.min(w,40)-1];
    const dueDays=daysBetween(today(),new Date(profile.due));
    h+='<div class="card stage-card"><p class="sub">当前阶段</p><div class="big">孕 '+w+' 周</div><p>'+(dueDays>=0?'距离预产期还有 '+dueDays+' 天':'已超预产期 '+(-dueDays)+' 天，遵医嘱')+'</p></div>';
    h+='<div class="card"><h3>👶 宝宝本周</h3><p>'+esc(d.baby)+'</p></div>';
    h+='<div class="card"><h3>🤰 妈妈本周</h3><p>'+esc(d.mom)+'</p><div class="tip">💡 '+esc(d.tip)+'</div></div>';
    h+=dadCard(d.dad,'pw'+w,'');
    // 今日餐单
    const ph=w<=12?'early':(w<=27?'mid':'late');
    const dt=DIET.find(x=>x.ph===ph);
    const di=(new Date().getDay()+6)%7; // 周一=0
    const day=dt.days[di];
    h+='<div class="card"><h3>🍽️ 今日餐单 <span class="tag pink">'+esc(dt.label)+'</span><span class="tag green">'+esc(day.d)+'</span></h3>'
      +'<div class="meal"><b>早餐</b><p>'+esc(day.b)+'</p></div>'
      +'<div class="meal"><b>午餐</b><p>'+esc(day.l)+'</p></div>'
      +'<div class="meal"><b>晚餐</b><p>'+esc(day.dn)+'</p></div>'
      +'<div class="meal"><b>加餐</b><p>'+esc(day.s)+'</p></div>'
      +'<div class="dad-inline"><b>👨 爸爸：</b><ul><li>按餐单采买食材，今天至少下厨一顿</li></ul></div></div>';
    const cur=CHECKUPS.filter(c=>{const m=c.t.match(/孕(\d+)-(\d+)/);return m&&w>=+m[1]&&w<=+m[2]});
    if(cur.length){
      h+='<div class="card"><div class="next-card"><div class="icon">🏥</div><div><div class="t">近期产检：'+esc(cur[0].n)+'</div><div class="d">'+esc(cur[0].t)+' · '+esc(cur[0].d)+'</div></div></div><div class="dad-inline"><b>👨 爸爸：</b><ul><li>'+esc(cur[0].dad)+'</li></ul></div></div>';
    }
  }else{
    const m=ageMonths();
    if(m<0){h+='<div class="card stage-card"><div class="big">宝宝还没出生哦</div><p>请在设置中检查生日</p></div>';}
    else if(m>=72){h+='<div class="card stage-card"><p class="sub">当前阶段</p><div class="big">'+ageText()+'</div><p>🎓 恭喜！宝宝已满6岁毕业啦。这6年你们辛苦了，未来的路继续加油！</p></div>';}
    else{
      const s=babyStage(m);
      h+='<div class="card stage-card"><p class="sub">当前阶段 · '+s.label+'</p><div class="big">'+ageText()+'</div><p>'+(profile.sex==='boy'?'👦 男宝':'👧 女宝')+' · 出生 '+daysBetween(new Date(profile.birth),today())+' 天</p></div>';
      h+='<div class="card"><h3>🌟 这个阶段的宝宝</h3><p>'+esc(s.mile)+'</p></div>';
      h+='<div class="card"><h3>🍚 喂养要点</h3><p>'+esc(s.feed)+'</p><div class="tip">😴 '+esc(s.sleep)+'</div></div>';
      h+=dadCard(s.dad,'bs'+s.range[0],'');
      // 下一针疫苗
      const done=lsGet('yb_vax',[]);
      let nv=null;
      for(const g of VAX){const pend=g.list.filter(v=>!done.includes(g.age+v));if(pend.length&&g.m>=Math.floor(m)-1){nv={age:g.age,list:pend};break}}
      if(nv) h+='<div class="card"><div class="next-card"><div class="icon">💉</div><div><div class="t">近期疫苗（'+nv.age+'）</div><div class="d">'+nv.list.map(esc).join('、')+'</div></div></div><div class="dad-inline"><b>👨 爸爸：</b><ul><li>预约接种、当天陪同，接种后留观30分钟</li></ul></div></div>';
    }
  }
  el.innerHTML=h;
}

// ===== 孕期tab =====
let curWeek=null;
function renderPregWeek(){
  const el=document.getElementById('preg-week');
  if(curWeek===null) curWeek=(profile&&profile.mode==='preg')?Math.min(pregWeek(),40):12;
  const d=PREG[curWeek-1];
  let h='<div class="week-nav"><button onclick="chgWeek(-1)">← 上一周</button><span class="cur">孕 '+curWeek+' 周</span><button onclick="chgWeek(1)">下一周 →</button></div>';
  h+='<div class="card"><h3>👶 宝宝发育</h3><p>'+esc(d.baby)+'</p></div>';
  h+='<div class="card"><h3>🤰 妈妈变化</h3><p>'+esc(d.mom)+'</p></div>';
  h+='<div class="card"><h3>⚠️ 本周注意</h3><p>'+esc(d.tip)+'</p></div>';
  h+=dadCard(d.dad,'pw'+curWeek,'');
  el.innerHTML=h;
}
function chgWeek(x){curWeek=Math.max(1,Math.min(40,curWeek+x));renderPregWeek()}
function renderCheckups(){
  let h='';
  CHECKUPS.forEach(c=>{
    h+='<div class="card"><h3>🏥 '+esc(c.n)+' <span class="tag pink">'+esc(c.t)+'</span></h3><p>'+esc(c.d)+'</p><div class="dad-inline"><b>👨 爸爸任务：</b><ul><li>'+esc(c.dad)+'</li></ul></div></div>';
  });
  document.getElementById('preg-checkup').innerHTML=h;
}
function renderBag(){
  const done=lsGet('yb_bag',[]);
  let h='';
  BAG.forEach((g,gi)=>{
    const isDad=g.g.includes('爸爸');
    h+='<div class="card"><h3>'+(isDad?'👨 ':'🎒 ')+esc(g.g)+'</h3>';
    g.items.forEach((it,i)=>{
      const k=gi+'-'+i, on=done.includes(k);
      h+='<label class="ck'+(on?' done':'')+'"><input type="checkbox" '+(on?'checked':'')+' onchange="bagToggle(\''+k+'\')"><span>'+esc(it)+'</span></label>';
    });
    h+='</div>';
  });
  document.getElementById('preg-bag').innerHTML=h;
}
function bagToggle(k){
  let done=lsGet('yb_bag',[]);
  done=done.includes(k)?done.filter(x=>x!==k):done.concat(k);
  lsSet('yb_bag',done); renderBag();
}

// ===== 每日食谱 =====
let curPh=null;
function renderDiet(){
  if(curPh===null){
    curPh='mid';
    if(profile&&profile.mode==='preg'){const w=pregWeek();curPh=w<=12?'early':(w<=27?'mid':'late')}
  }
  const dt=DIET.find(x=>x.ph===curPh);
  let h='<div class="chips">';
  DIET.forEach(x=>{h+='<button class="chip'+(x.ph===curPh?' on':'')+'" onclick="pickPh(\''+x.ph+'\')">'+esc(x.label)+'</button>'});
  h+='</div>';
  h+='<div class="tip" style="margin:0 0 12px">📌 '+esc(dt.note)+'</div>';
  const di=(new Date().getDay()+6)%7;
  dt.days.forEach((day,i)=>{
    h+='<div class="card"><h3>'+esc(day.d)+(i===di?' <span class="tag green">今天</span>':'')+'</h3>'
      +'<div class="meal"><b>🌅 早餐</b><p>'+esc(day.b)+'</p></div>'
      +'<div class="meal"><b>☀️ 午餐</b><p>'+esc(day.l)+'</p></div>'
      +'<div class="meal"><b>🌙 晚餐</b><p>'+esc(day.dn)+'</p></div>'
      +'<div class="meal"><b>🍎 加餐</b><p>'+esc(day.s)+'</p></div></div>';
  });
  h+='<div class="dad-inline"><b>👨 爸爸任务：</b><ul><li>每周按食谱列采购清单，周末一次买齐+工作日补新鲜菜</li><li>每天至少负责一顿饭（早餐最容易上手）</li><li>妻子孕吐/胃口差时灵活替换同类食材，别强求</li></ul></div>';
  h+='<p style="font-size:11.5px;color:#b3a89f;margin-top:10px;line-height:1.6">食谱为通用参考（普通体重单胎），有妊娠期糖尿病、高血压或过敏者请按医生/营养师方案调整。</p>';
  document.getElementById('preg-diet').innerHTML=h;
}
function pickPh(p){curPh=p;renderDiet()}

// ===== 育儿tab =====
let curSeg='y1', curStage=null;
function renderBaby(){
  const el=document.getElementById('baby-content');
  if(curSeg==='care'){
    let h='';
    CARE.forEach(c=>{
      h+='<div class="card"><h3>'+c.icon+' '+esc(c.t)+'</h3><p>'+esc(c.d)+'</p><div class="tip">🚨 '+esc(c.warn)+'</div><div class="dad-inline"><b>👨 '+esc(c.dad)+'</b></div></div>';
    });
    el.innerHTML=h; return;
  }
  const stages=BABY.filter(s=>s.seg===curSeg);
  if(curStage===null||!stages.includes(curStage)){
    curStage=stages[0];
    if(profile&&profile.mode==='born'){const s=babyStage(ageMonths());if(s&&s.seg===curSeg)curStage=s;}
  }
  let h='<div class="chips">';
  stages.forEach((s,i)=>{h+='<button class="chip'+(s===curStage?' on':'')+'" onclick="pickStage(\''+curSeg+'\','+i+')">'+esc(s.label)+'</button>'});
  h+='</div>';
  const s=curStage;
  h+='<div class="card"><h3>🌟 发育里程碑</h3><p>'+esc(s.mile)+'</p></div>';
  h+='<div class="card"><h3>🍚 喂养</h3><p>'+esc(s.feed)+'</p></div>';
  h+='<div class="card"><h3>😴 睡眠</h3><p>'+esc(s.sleep)+'</p></div>';
  h+='<div class="card"><h3>🩺 保健与注意</h3><p>'+esc(s.care)+'</p></div>';
  h+=dadCard(s.dad,'bs'+s.range[0],'');
  el.innerHTML=h;
}
function pickStage(seg,i){curStage=BABY.filter(s=>s.seg===seg)[i];renderBaby()}

// ===== 疫苗tab =====
function renderVax(){
  const done=lsGet('yb_vax',[]);
  const m=(profile&&profile.mode==='born')?ageMonths():-1;
  let h='';
  VAX.forEach(g=>{
    const due=m>=0&&m>=g.m&&g.list.some(v=>!done.includes(g.age+v));
    h+='<div class="vax-group"><div class="vax-age">'+esc(g.age)+(due?' <span class="tag amber">到期未种</span>':'')+'</div><div class="card" style="margin-bottom:4px">';
    g.list.forEach(v=>{
      const k=g.age+v, on=done.includes(k);
      h+='<label class="ck'+(on?' done':'')+'"><input type="checkbox" '+(on?'checked':'')+' onchange="vaxToggle(\''+esc(k)+'\')"><span>'+esc(v)+'</span></label>';
    });
    h+='</div></div>';
  });
  h+='<div class="dad-inline" style="margin-top:12px"><b>👨 爸爸任务：</b><ul><li>疫苗本由你保管，接种由你预约和陪同</li><li>接种后留观30分钟，当天多喂水、观察体温</li><li>自费疫苗（13价肺炎、五联、轮状、手足口、流感等）主动做功课，和妻子商量安排</li></ul></div>';
  document.getElementById('vax-list').innerHTML=h;
}
function vaxToggle(k){
  let done=lsGet('yb_vax',[]);
  done=done.includes(k)?done.filter(x=>x!==k):done.concat(k);
  lsSet('yb_vax',done); renderVax(); renderHome();
}

// ===== 成长记录 =====
function growthRef(m,sex){
  let best=GROWTH[0];
  for(const r of GROWTH){if(Math.abs(r[0]-m)<Math.abs(best[0]-m))best=r}
  return sex==='boy'?{m:best[0],w:[best[1],best[2]],h:[best[3],best[4]]}:{m:best[0],w:[best[5],best[6]],h:[best[7],best[8]]};
}
function renderRec(){
  const refEl=document.getElementById('rec-ref');
  if(profile&&profile.mode==='born'&&ageMonths()>=0&&ageMonths()<73){
    const r=growthRef(ageMonths(),profile.sex);
    refEl.innerHTML='宝宝当前约 <b>'+ageText()+'</b>（参考'+r.m+'月龄，WHO标准）<br>身高正常范围：<b>'+r.h[0]+' - '+r.h[1]+' cm</b><br>体重正常范围：<b>'+r.w[0]+' - '+r.w[1]+' kg</b><br><span style="font-size:11.5px">超出范围不代表异常，请结合生长曲线趋势由儿保医生评估。</span>';
  }else refEl.innerHTML='宝宝出生后，这里会显示对应月龄的身高体重参考范围。';
  const recs=lsGet('yb_recs',[]);
  const listEl=document.getElementById('rec-list');
  if(!recs.length){listEl.innerHTML='<div class="empty">还没有记录，添加第一条吧</div>';return}
  let h='';
  recs.slice().sort((a,b)=>b.d.localeCompare(a.d)).forEach((r,i)=>{
    h+='<div class="rec-row"><div><b>'+esc(r.d)+'</b><div class="d">身高 '+r.h+' cm · 体重 '+r.w+' kg</div></div><button class="btn ghost" style="width:auto;margin:0" onclick="delRec(\''+esc(r.d)+'\')">删除</button></div>';
  });
  listEl.innerHTML=h;
}
function addRec(){
  const d=document.getElementById('rec-date').value;
  const h=parseFloat(document.getElementById('rec-h').value);
  const w=parseFloat(document.getElementById('rec-w').value);
  if(!d||(!h&&!w)){alert('请填写日期和至少一项数据');return}
  const recs=lsGet('yb_recs',[]).filter(r=>r.d!==d);
  recs.push({d:d,h:h||'-',w:w||'-'});
  lsSet('yb_recs',recs);
  document.getElementById('rec-h').value='';document.getElementById('rec-w').value='';
  renderRec();
}
function delRec(d){lsSet('yb_recs',lsGet('yb_recs',[]).filter(r=>r.d!==d));renderRec()}

// ===== 导航 =====
document.getElementById('nav').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return;
  document.querySelectorAll('#nav button').forEach(x=>x.classList.toggle('on',x===b));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+b.dataset.v).classList.add('active');
  document.querySelector('main').scrollTop=0; window.scrollTo(0,0);
});
document.getElementById('preg-seg').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return;
  document.querySelectorAll('#preg-seg button').forEach(x=>x.classList.toggle('on',x===b));
  ['week','checkup','bag','diet'].forEach(p=>document.getElementById('preg-'+p).classList.toggle('hidden',p!==b.dataset.p));
});
document.getElementById('baby-seg').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return;
  document.querySelectorAll('#baby-seg button').forEach(x=>x.classList.toggle('on',x===b));
  curSeg=b.dataset.b; curStage=null; renderBaby();
});

// ===== 引导页 =====
let obMode=null;
function obPick(m){
  obMode=m;
  document.getElementById('ob-preg').classList.toggle('on',m==='preg');
  document.getElementById('ob-born').classList.toggle('on',m==='born');
  document.getElementById('ob-form-preg').classList.toggle('hidden',m!=='preg');
  document.getElementById('ob-form-born').classList.toggle('hidden',m!=='born');
}
function obSave(){
  if(!obMode){alert('请先选择当前阶段');return}
  if(obMode==='preg'){
    const due=document.getElementById('ob-due').value;
    if(!due){alert('请填写预产期');return}
    profile={mode:'preg',due:due};
  }else{
    const birth=document.getElementById('ob-birth').value;
    if(!birth){alert('请填写宝宝生日');return}
    profile={mode:'born',birth:birth,sex:document.getElementById('ob-sex').value};
  }
  lsSet('yb_profile',profile);
  document.getElementById('onboard').classList.add('hidden');
  curWeek=null; curStage=null; curPh=null;
  renderAll();
}
function openOnboard(){
  if(profile){
    obPick(profile.mode);
    if(profile.mode==='preg')document.getElementById('ob-due').value=profile.due;
    else{document.getElementById('ob-birth').value=profile.birth;document.getElementById('ob-sex').value=profile.sex}
  }
  document.getElementById('onboard').classList.remove('hidden');
}

// ===== 启动 =====
function renderAll(){renderHome();renderPregWeek();renderCheckups();renderBag();renderDiet();renderBaby();renderVax();renderRec()}
document.getElementById('rec-date').value=new Date().toISOString().slice(0,10);
if(!profile){document.getElementById('onboard').classList.remove('hidden')}
renderAll();
// v1.1 diet module
</script>
